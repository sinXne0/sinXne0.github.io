<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--green:#00ff41;--cyan:#00e8ff;--amber:#ffb300;--magenta:#ff44cc;
--red:#ff3355;--bg:#00000c;--darkbg:#050510;--dimgreen:#00aa2a;
--dimcyan:#007788;--white:#ccffcc;
}
body{
font-family:'VT323',monospace;background:var(--bg);color:var(--green);
font-size:20px;overflow:hidden;height:100vh;width:100vw;
}
/* CRT Effects */
.crt-overlay{
position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9000;
background:repeating-linear-gradient(
0deg,
rgba(0,0,0,0.15) 0px,
rgba(0,0,0,0.15) 1px,
transparent 1px,
transparent 3px
);
}
.rolling-scanline{
position:fixed;top:0;left:0;width:100%;height:8px;pointer-events:none;z-index:9001;
background:rgba(0,255,65,0.08);
animation:rollscan 4s linear infinite;
}
@keyframes rollscan{0%{top:-8px;}100%{top:100vh;}}
.vignette{
position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8999;
background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.7) 100%);
}
.screen-flicker{animation:flicker 0.1s infinite alternate;}
@keyframes flicker{0%{opacity:0.985;}100%{opacity:1;}}
@keyframes breathe{0%,100%{filter:brightness(1);}50%{filter:brightness(1.02);}}
#app{
display:flex;flex-direction:column;height:100vh;padding:6px;
animation:breathe 4s ease-in-out infinite;
}
#top-row{display:flex;flex:1;min-height:0;gap:6px;}
#main-panel{flex:3;overflow-y:auto;padding:8px;position:relative;min-width:0;}
#stats-panel{flex:1;min-width:260px;max-width:320px;overflow-y:auto;padding:8px;}
#log-panel{height:140px;overflow-y:auto;padding:6px 8px;margin-top:4px;}
#input-bar{
display:flex;align-items:center;padding:4px 8px;margin-top:4px;
border:1px solid var(--green);background:rgba(0,20,0,0.3);
}
#input-bar span{color:var(--cyan);margin-right:6px;white-space:nowrap;}
#cmd-input{
background:transparent;border:none;color:var(--green);font-family:'VT323',monospace;
font-size:20px;flex:1;outline:none;caret-color:var(--green);
}
.panel-border{
border:1px solid var(--dimgreen);background:rgba(0,10,0,0.25);
position:relative;
}
/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--dimgreen);border-radius:3px;}
/* Text colors */
.c-green{color:var(--green);}.c-cyan{color:var(--cyan);}.c-amber{color:var(--amber);}
.c-magenta{color:var(--magenta);}.c-red{color:var(--red);}.c-white{color:var(--white);}
.c-dim{color:#446644;}.c-bold{font-weight:bold;}
/* HP/CPU bars */
.bar-container{
width:100%;height:18px;background:#111;border:1px solid var(--dimgreen);
margin:2px 0;position:relative;
}
.bar-fill{height:100%;transition:width 0.3s;}
.bar-hp .bar-fill{background:linear-gradient(90deg,#003300,var(--green));}
.bar-cpu .bar-fill{background:linear-gradient(90deg,#001133,var(--cyan));}
.bar-xp .bar-fill{background:linear-gradient(90deg,#332200,var(--amber));}
.bar-label{
position:absolute;top:0;left:4px;font-size:16px;line-height:18px;color:var(--white);z-index:1;
}
/* Buttons */
.btn{
display:inline-block;padding:4px 14px;margin:3px;border:1px solid var(--green);
background:rgba(0,40,0,0.4);color:var(--green);font-family:'VT323',monospace;
font-size:20px;cursor:pointer;transition:all 0.15s;
}
.btn:hover{background:rgba(0,255,65,0.15);text-shadow:0 0 8px var(--green);}
.btn-cyan{border-color:var(--cyan);color:var(--cyan);}
.btn-cyan:hover{background:rgba(0,232,255,0.12);text-shadow:0 0 8px var(--cyan);}
.btn-amber{border-color:var(--amber);color:var(--amber);}
.btn-amber:hover{background:rgba(255,179,0,0.12);text-shadow:0 0 8px var(--amber);}
.btn-red{border-color:var(--red);color:var(--red);}
.btn-red:hover{background:rgba(255,51,85,0.12);text-shadow:0 0 8px var(--red);}
.btn-magenta{border-color:var(--magenta);color:var(--magenta);}
.btn-magenta:hover{background:rgba(255,68,204,0.12);text-shadow:0 0 8px var(--magenta);}
.btn-disabled{opacity:0.35;cursor:default;pointer-events:none;}
/* Log lines */
.log-line{font-size:18px;line-height:1.3;white-space:pre-wrap;word-break:break-word;}
/* Menu items */
.menu-item{
padding:2px 8px;cursor:pointer;border:1px solid transparent;
transition:all 0.1s;
}
.menu-item:hover{border-color:var(--green);background:rgba(0,255,65,0.06);}
.menu-item.selected{border-color:var(--cyan);background:rgba(0,232,255,0.1);color:var(--cyan);}
/* Grid for shop */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.shop-item{
border:1px solid var(--dimgreen);padding:4px 6px;cursor:pointer;
transition:all 0.12s;font-size:18px;
}
.shop-item:hover{border-color:var(--cyan);background:rgba(0,232,255,0.06);}
.shop-item .tier{font-size:16px;}
/* Toast */
.toast{
position:fixed;top:20px;left:50%;transform:translateX(-50%);
background:rgba(0,40,0,0.9);border:2px solid var(--cyan);color:var(--cyan);
padding:10px 30px;font-size:20px;z-index:9500;
animation:toastIn 0.3s ease;
font-family:'VT323',monospace;
}
@keyframes toastIn{0%{opacity:0;top:0;}100%{opacity:1;top:20px;}}
/* Class cards */
.class-card{
border:1px solid var(--dimgreen);padding:6px 10px;margin:4px 0;cursor:pointer;
transition:all 0.15s;
}
.class-card:hover{border-color:var(--cyan);background:rgba(0,232,255,0.06);}
.class-card.selected{border-color:var(--magenta);background:rgba(255,68,204,0.1);}
/* ASCII art pre */
pre.ascii{color:var(--cyan);font-size:18px;line-height:1.1;white-space:pre;}
/* Combatant display */
.combatant-box{
border:1px solid var(--dimgreen);padding:6px;margin:4px 0;
}
.enemy-box{border-color:var(--red);}
/* Section headers */
.section-hdr{
color:var(--cyan);border-bottom:1px solid var(--dimcyan);
padding-bottom:2px;margin-bottom:4px;font-size:18px;
}
/* Cursor blink */
.blink{animation:blinker 0.8s step-end infinite;}
@keyframes blinker{0%,100%{opacity:1;}50%{opacity:0;}}
/* Codex */
.codex-entry{border:1px solid var(--dimgreen);padding:6px;margin:4px 0;cursor:pointer;}
.codex-entry:hover{border-color:var(--amber);background:rgba(255,179,0,0.05);}
/* Boot text */
.boot-line{opacity:0;animation:bootFade 0.3s forwards;}
@keyframes bootFade{to{opacity:1;}}
/* Equipped slot */
.equip-slot{
display:inline-block;border:1px solid var(--amber);padding:2px 6px;margin:2px;
font-size:17px;min-width:100px;text-align:center;
}
.equip-slot.empty{border-color:#333;color:#444;}
.hw-tier{display:flex;justify-content:space-between;align-items:center;
border:1px solid var(--dimgreen);padding:4px 6px;margin:2px 0;font-size:18px;}
.hw-tier.owned{border-color:var(--green);background:rgba(0,255,65,0.06);}
.hw-tier.available{cursor:pointer;}
.hw-tier.available:hover{border-color:var(--cyan);background:rgba(0,232,255,0.06);}
.hw-tier.locked{opacity:0.4;}
</style>

var storyEventActive = null;

function triggerStoryEvent(event) {
  storyEventActive = event;
  var color = 'var(--' + (event.color || 'amber') + ')';
  var h = '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,10,0.92);z-index:8000;display:flex;align-items:center;justify-content:center;" id="story-overlay">';
  h += '<div style="max-width:600px;width:90%;border:2px solid '+color+';padding:20px;background:rgba(0,5,15,0.98);">';
  h += '<div style="color:'+color+';font-size:24px;margin-bottom:12px;border-bottom:1px solid '+color+';padding-bottom:6px;">' + esc(event.title) + '</div>';
  var lines = event.text.split('\n');
  for(var i=0;i<lines.length;i++){
    if(lines[i]===''){
      h += '<div style="height:8px;"></div>';
    } else {
      h += '<div style="color:var(--white);font-size:18px;line-height:1.5;">' + esc(lines[i]) + '</div>';
    }
  }
  h += '<div style="margin-top:16px;">';
  for(var c=0;c<event.choices.length;c++){
    h += '<div class="btn btn-' + (event.color||'amber') + '" style="display:block;margin:4px 0;" onclick="handleStoryAction(\''+event.choices[c].action+'\')">' + esc(event.choices[c].text) + '</div>';
  }
  h += '</div></div></div>';
  var overlay = document.createElement('div');
  overlay.id = 'story-event-container';
  overlay.innerHTML = h;
  document.body.appendChild(overlay);
}

function handleStoryAction(action) {
  var overlay = document.getElementById('story-event-container');
  if(overlay) overlay.remove();
  storyEventActive = null;

  switch(action) {
    case 'dismiss':
      log('You move on.', 'var(--dim)');
      break;
    case 'trace_cipher':
      log('Signal gone. Too many proxies. Seventeen layers and counting.', 'var(--cyan)');
      gainXP(30);
      break;
    case 'dead_runner_log':
      log('LOG — GHOST_ECHO — last entry:', 'var(--red)');
      log('"The Void isn\'t empty. Something lives there. Something OLD."', 'var(--red)');

        gainCred(100);

        log('Signal masked. NETWATCH sweep passes over you. -20 CPU.', 'var(--cyan)');

// ── STAT CALCULATIONS ──
function getMaxHP(){
  var base = player.hpMax;
  var rigTier = player.hardware.rig.tier;
  var rigBonus = HARDWARE.rig[rigTier] ? HARDWARE.rig[rigTier].hpBonus : 0;
  var presBonus = base * (player.prestigeBonus / 100);
  return Math.floor(base + rigBonus + presBonus);
}
function getMaxCPU(){
  var base = player.cpuMax;
  var deckTier = player.hardware.deck.tier;
  var deckBonus = HARDWARE.deck[deckTier] ? HARDWARE.deck[deckTier].cpuBonus : 0;
  var presBonus = base * (player.prestigeBonus / 100);
  return Math.floor(base + deckBonus + presBonus);
}
function getATK(){
  var base = player.atk;
  var presBonus = base * (player.prestigeBonus / 100);
  var classBonus = (player.playerClass === 'BLACK_HAT') ? base * 0.25 : 0;
  return Math.floor(base + presBonus + classBonus);
}
function getDEF(){
  var base = player.def;
  var presBonus = base * (player.prestigeBonus / 100);
  return Math.floor(base + presBonus);
}
function getCritChance(){
  var c = player.crit;
  if(player.playerClass === 'BLACK_HAT') c += 0.05;
  // Neural implant
  for(var i=0;i<player.equipped.length;i++){
    if(player.equipped[i]==='NEURAL_IMPLANT') c += 0.15;
  }
  // reputation bonus
  if(player.reputation.ghost_net >= 100) c += 0.15;
  return c;
}
function getDodgeChance(){
  var d = player.dodge;
  if(player.playerClass === 'GHOST') d += 0.30;
  if(playerStatusEffects.stealth) d += 0.20;
  return d;
}
function getProgPower(prog){
  var base = prog.pwr || 0;
  var ramTier = player.hardware.ram.tier;
  var ramBonus = HARDWARE.ram[ramTier] ? HARDWARE.ram[ramTier].pwrBonus : 0;
  var classBonus = (player.playerClass === 'NETRUNNER') ? 0.10 : 0;
  return Math.floor(base * (1 + ramBonus + classBonus));
}
function getProgCPUCost(prog){
  var base = prog.cpu || 0;
  var classDiscount = (player.playerClass === 'PHREAKER') ? 0.20 : 0;
  return Math.max(0, Math.floor(base * (1 - classDiscount)));
}
function getCPURegen(){
  var base = 10;
  if(playerStatusEffects.overclocked) base *= 2;
  return base;
}
function getXPMult(){
  return (player.playerClass === 'SCRIPT_KIDDIE') ? 1.5 : 1.0;
}
function floorScale(floor){
  return 1 + (floor - 1) * 0.18;
}
function xpForLevel(lv){
  return Math.floor(100 * Math.pow(lv, 1.5));
}

// ── LEVEL UP ──
function gainXP(amount){
  amount = Math.floor(amount * getXPMult());
  player.xp += amount;
  log('+ ' + amount + ' XP', 'var(--amber)');
  while(player.xp >= player.xpNext){
    player.xp -= player.xpNext;
    player.level++;
    player.hpMax += 10;
    player.cpuMax += 5;
    player.atk += 2;
    player.def += 1;
    player.xpNext = xpForLevel(player.level);
    player.hp = getMaxHP();
    player.cpu = getMaxCPU();
    log('═══ LEVEL UP! Now level ' + player.level + ' ═══', 'var(--magenta)');
    toast('LEVEL ' + player.level + '!');
    // Every 5 levels
    if(player.level % 5 === 0){
      player.crit += 0.02;
      log('  >> Crit chance increased!', 'var(--cyan)');
    }
    // Every 10 levels
    if(player.level % 10 === 0){
      log('  >> TIER UNLOCK — New programs available!', 'var(--magenta)');
    }
  }
  save();
}

function rollLoot(tier, enemy) {
  var table = LOOT_TABLES[tier] || LOOT_TABLES.common;
  var drops = [];
  var baseCred = enemy ? Math.floor(enemy.cred * (0.8 + Math.random() * 0.6)) : 20;
  drops.push({ type:'cred', amount: baseCred });
  table.forEach(function(entry) {
    if (entry.type === 'cred') {
      if (Math.random() < 0.6) {
        drops.push({ type:'cred', amount: entry.min + Math.floor(Math.random()*(entry.max-entry.min)) });
      }
    } else if (entry.type === 'program') {
      if (Math.random() < entry.chance) {
        var prog = PROGRAMS.find(function(p){return p.name===entry.name;});
        if (prog) {
          var isConsumable = ['REPAIR_KIT','CPU_BOOST','LARGE_REPAIR'].indexOf(entry.name) !== -1;
          var alreadyHas = player.programs.indexOf(entry.name) !== -1;
          if (isConsumable || !alreadyHas) {
            drops.push({ type:'program', name: entry.name });
          }
        }
      }
    } else if (entry.type === 'darkCred' || entry.type === 'darkData') {
      if (Math.random() < (entry.chance || 0.1)) {
        var amt = entry.min + Math.floor(Math.random()*(entry.max - entry.min + 1));
        drops.push({ type:'darkCred', amount: amt });
      }
    }
  });
  return drops;
}

function applyLoot(drops) {
  var messages = [];
  drops.forEach(function(drop) {
    if (drop.type === 'cred') {
      player.cred += drop.amount;
      player.stats.credEarned += drop.amount;
      messages.push('  + ' + drop.amount + '\u00A2 CRED');
    } else if (drop.type === 'darkCred') {
      player.darkCred += drop.amount;
      player.stats.darkCredEarned += drop.amount;
      messages.push('  + ' + drop.amount + ' DC  <DARK CRED>');
    } else if (drop.type === 'program') {
      if (player.programs.length < 20) {
        player.programs.push(drop.name);
        var prog = PROGRAMS.find(function(p){return p.name===drop.name;});
        var tier = prog ? '(T'+prog.tier+')' : '';
        messages.push('  + PROGRAM: ' + drop.name + ' ' + tier + ' [ACQUIRED]');
      } else {
        var prog2 = PROGRAMS.find(function(p){return p.name===drop.name;});
        var val = prog2 ? Math.floor(prog2.price * 0.4) : 50;
        player.cred += val;
        player.stats.credEarned += val;
        messages.push('  + ' + drop.name + ' AUTO-SOLD: +' + val + '\u00A2 (bag full)');
      }
    }
  });
  return messages;
}

function genBoss(floor){
  // Find which boss
  var bossIdx = -1;
  for(var i=BOSS_DATA.length-1;i>=0;i--){
    if(floor >= BOSS_DATA[i].floor){bossIdx = i;break;}
  }
  if(bossIdx < 0) bossIdx = 0;
  var base = BOSS_DATA[bossIdx];
  var scale = floorScale(floor);
  var cycleMultiplier = 1 + Math.floor(floor / 25) * 0.5;
  return {
    name: base.name,
    hp: Math.floor(base.hp * scale * cycleMultiplier),
    hpMax: Math.floor(base.hp * scale * cycleMultiplier),
    atk: Math.floor(base.atk * scale * cycleMultiplier),
    def: Math.floor(base.def * scale * cycleMultiplier),
    xp: Math.floor(base.hp * 0.5 * scale),
    cred: Math.floor(base.hp * 0.3 * scale),
    special: base.special,
    desc: base.desc,
    isICE: true,
    isBoss: true,
    dc: Math.floor(base.dc * cycleMultiplier),
    specialCooldown: 0,
    turnCount: 0,
    phase: 1,
  };
}

// ── ROOM GENERATION ──
function generateRoom(){
  var r = Math.random();
  var areaDescs = ROOM_DESCS[player.area] || ROOM_DESCS.arasaka;
  var room = {desc: pick(areaDescs), type:'empty', data:null};
  // Boss every 5 floors (first room of that floor)
  if(player.floor % 5 === 0 && !player._bossDefeatedThisFloor){
    room.type = 'boss';
    room.data = genBoss(player.floor);
    return room;
  }
  if(r < 0.40){ room.type = 'enemy'; room.data = genEnemy(player.floor); }
  else if(r < 0.60){ room.type = 'event'; room.data = pick(EVENTS); }
  else if(r < 0.75){ room.type = 'loot'; }
  else if(r < 0.85){ room.type = 'safe'; }
  else if(r < 0.95){ room.type = 'hidden'; }
  else { room.type = 'empty'; }
  return room;
}

function generateLoot(){
  // Pick a random affordable program or cred
  if(Math.random() < 0.4){
    var amount = rand(20, 50) * player.floor;
    return {type:'cred', amount:amount};
  }
  var maxTier = Math.min(5, 1 + Math.floor(player.level / 10));
  var candidates = PROGRAMS.filter(function(p){return p.tier <= maxTier && !p.consumable;});
  if(candidates.length === 0) return {type:'cred', amount: 100};
  return {type:'program', program: pick(candidates)};
}

// ── COMBAT ──
function startCombat(enemy){
  currentEnemy = enemy;
  combatLog = [];
  combatTurn = 0;
  enemyStatusEffects = {};
  playerStatusEffects = {};
  gameState = 'combat';
  clog('═══ COMBAT INITIATED ═══', 'var(--red)');
  clog('Target: ' + enemy.name + ' [HP:' + enemy.hp + ' ATK:' + enemy.atk + ' DEF:' + enemy.def + ']', 'var(--cyan)');
  if(enemy.isBoss){
    clog('>> BOSS ENCOUNTER <<', 'var(--magenta)');
  }

}

function clog(msg, color){
  color = color || 'var(--green)';
  combatLog.push({msg:msg,color:color});
  if(combatLog.length > 12) combatLog.shift();
  log(msg, color);
}

function playerBasicAttack(){
  if(gameState !== 'combat' || !currentEnemy) return;
  var atk = getATK() + rand(1,5);
  var isCrit = Math.random() < getCritChance();
  if(isCrit){
    var critMult = (player.playerClass === 'BLACK_HAT') ? 3 : 2;
    atk = Math.floor(atk * critMult);
    clog(pick(COMBAT_FLAVOR.playerCrit), 'var(--magenta)');
  }
  // Enemy dodge
  if(currentEnemy.special === 'dodge' && Math.random() < 0.15){
    clog(currentEnemy.name + ' phased out. ' + pick(COMBAT_FLAVOR.playerMiss), 'var(--amber)');
    endPlayerTurn();
    return;
  }
  var defReduction = enemyStatusEffects.weakened ? currentEnemy.def - 5 : currentEnemy.def;
  if(defReduction < 0) defReduction = 0;
  var dmg = Math.max(1, atk - defReduction);
  // Scan bonus
  if(enemyStatusEffects.scanned && enemyStatusEffects.scanned > 0){
    dmg = Math.floor(dmg * 1.2);
  }
  // Ice breaker bonus
  if(currentEnemy.isICE){
    var ibTier = player.hardware.icebreaker.tier;
    var ibBonus = HARDWARE.icebreaker[ibTier] ? HARDWARE.icebreaker[ibTier].iceBonus : 0;
    dmg = Math.floor(dmg * (1 + ibBonus));
  }
  // Boss reflect
  if(currentEnemy.special === 'reflect'){
    var reflectDmg = Math.floor(dmg * 0.2);
    player.hp -= reflectDmg;
    clog('  Reflected ' + reflectDmg + ' damage back!', 'var(--amber)');
  }
  currentEnemy.hp -= dmg;
  if(!isCrit) clog(pick(COMBAT_FLAVOR.playerHit), 'var(--green)');
  clog('BASIC ATTACK — ' + dmg + ' damage to ' + currentEnemy.name, 'var(--green)');
  checkCombatEnd('player');
}

function playerUseProgram(progName){
  if(gameState !== 'combat' || !currentEnemy) return;
  var prog = getProgramDef(progName);
  if(!prog) return;
  var cost = getProgCPUCost(prog);
  if(cost > player.cpu){
    clog('Not enough CPU! Need ' + cost, 'var(--red)');
    return;
  }
  player.cpu -= cost;

  switch(prog.type){
    case 'attack':
      var pwr = getProgPower(prog);
      var isCrit = Math.random() < getCritChance();
      if(isCrit){
        var critMult = (player.playerClass === 'BLACK_HAT') ? 3 : 2;
        pwr = Math.floor(pwr * critMult);
        clog(pick(COMBAT_FLAVOR.playerCrit), 'var(--magenta)');
      } else {
        clog(pick(COMBAT_FLAVOR.playerHit), 'var(--green)');
      }
      if(prog.special === 'bypass_def'){
        // Zero day bypasses defense
      } else {
        var defR = enemyStatusEffects.weakened ? Math.max(0, currentEnemy.def - 5) : currentEnemy.def;
        pwr = Math.max(1, pwr - Math.floor(defR * 0.5));
      }
      if(enemyStatusEffects.scanned && enemyStatusEffects.scanned > 0) pwr = Math.floor(pwr * 1.2);
      if(currentEnemy.isICE && prog.special === 'ice_bonus') pwr = Math.floor(pwr * 1.3);
      if(currentEnemy.isICE){
        var ibTier2 = player.hardware.icebreaker.tier;
        var ibB2 = HARDWARE.icebreaker[ibTier2] ? HARDWARE.icebreaker[ibTier2].iceBonus : 0;
        pwr = Math.floor(pwr * (1 + ibB2));
      }
      // Execute check
      if(prog.special === 'execute' && currentEnemy.hp < currentEnemy.hpMax * 0.2){
        clog('>> KILLSWITCH ACTIVATED — INSTANT TERMINATION!', 'var(--red)');
        currentEnemy.hp = 0;
      } else if(prog.special === 'double_hit'){
        var half = Math.floor(pwr / 2);
        currentEnemy.hp -= half;
        clog(prog.name + ' hits for ' + half + '!', 'var(--green)');
        currentEnemy.hp -= half;
        clog(prog.name + ' hits again for ' + half + '!', 'var(--green)');
      } else if(prog.special === 'stun_chance'){
        currentEnemy.hp -= pwr;
        clog(prog.name + ' deals ' + pwr + ' damage!', 'var(--green)');
        if(Math.random() < 0.2){
          enemyStatusEffects.stunned = 1;
          clog('  >> Enemy STUNNED!', 'var(--cyan)');
        }
      } else if(prog.special === 'siphon'){
        currentEnemy.hp -= pwr;
        var stolen = rand(10,30);
        gainCred(stolen);
        clog(prog.name + ' deals ' + pwr + ' + siphons ' + stolen + ' cred!', 'var(--green)');
      } else {
        if(currentEnemy.special === 'reflect' && currentEnemy.hp > 0){
          var ref2 = Math.floor(pwr * 0.2);
          player.hp -= ref2;
          clog('  Reflected ' + ref2 + ' damage!', 'var(--amber)');
        }
        currentEnemy.hp -= pwr;
        clog(prog.name + ' deals ' + pwr + ' damage!', 'var(--green)');
      }
      break;
    case 'defense':
      var shield = getProgPower(prog);
      playerStatusEffects.shielded = (playerStatusEffects.shielded || 0) + shield;
      clog(prog.name + ' — shield +' + shield + ' HP!', 'var(--cyan)');
      break;
    case 'heal':
      var heal = getProgPower(prog);
      player.hp = Math.min(getMaxHP(), player.hp + heal);
      clog(prog.name + ' restores ' + heal + ' HP!', 'var(--green)');
      // Remove consumable
      if(prog.consumable){
        var idx = player.programs.indexOf(progName);
        if(idx >= 0) player.programs.splice(idx, 1);
        var eIdx = player.equipped.indexOf(progName);
        if(eIdx >= 0) player.equipped.splice(eIdx, 1);
      }
      break;
    case 'cpu_restore':
      player.cpu = Math.min(getMaxCPU(), player.cpu + (prog.pwr || 30));
      clog(prog.name + ' restores ' + prog.pwr + ' CPU!', 'var(--cyan)');
      if(prog.consumable){
        var idx2 = player.programs.indexOf(progName);
        if(idx2 >= 0) player.programs.splice(idx2, 1);
        var eIdx2 = player.equipped.indexOf(progName);
        if(eIdx2 >= 0) player.equipped.splice(eIdx2, 1);
      }
      break;
    case 'debuff':
      if(prog.special === 'weaken'){
        enemyStatusEffects.weakened = 3;
        clog(prog.name + ' — enemy DEF reduced for 3 turns!', 'var(--amber)');
      }
      break;
    case 'utility':
      if(prog.special === 'scan'){
        enemyStatusEffects.scanned = 2;
        clog(prog.name + ' — target scanned! +20% dmg for 2 turns.', 'var(--cyan)');
      } else if(prog.special === 'cleanse'){
        delete playerStatusEffects.traced;
        playerStatusEffects.stealth = 1;
        clog('TRACED removed! Stealth active.', 'var(--cyan)');
      } else if(prog.special === 'overclock'){
        playerStatusEffects.overclocked = 3;
        clog('OVERCLOCKED! CPU regen doubled for 3 turns.', 'var(--cyan)');
      } else if(prog.special === 'skip_combat'){
        clog('GHOST PROTOCOL — combat skipped!', 'var(--magenta)');
        currentEnemy = null;
        gameState = 'explore';
        render();
        return;
      }
      break;
  }
  checkCombatEnd('player');
}

function playerFlee(){
  var chance = (player.playerClass === 'GHOST') ? 1.0 : 0.5;
  if(Math.random() < chance){
    clog('Successfully jacked out of combat!', 'var(--amber)');
    currentEnemy = null;
    gameState = 'explore';
    render();
    return;
  }
  clog('Failed to flee!', 'var(--red)');
  endPlayerTurn();
}

function useConsumable(progName){
  var prog = getProgramDef(progName);
  if(!prog || !prog.consumable) return;
  if(prog.type === 'heal'){
    player.hp = Math.min(getMaxHP(), player.hp + (prog.pwr || 0));
    clog('Used ' + progName + ' — restored ' + prog.pwr + ' HP!', 'var(--green)');
  } else if(prog.type === 'cpu_restore'){
    player.cpu = Math.min(getMaxCPU(), player.cpu + (prog.pwr || 0));
    clog('Used ' + progName + ' — restored ' + prog.pwr + ' CPU!', 'var(--cyan)');
  }
  var idx = player.programs.indexOf(progName);
  if(idx >= 0) player.programs.splice(idx, 1);
  var eIdx = player.equipped.indexOf(progName);
  if(eIdx >= 0) player.equipped.splice(eIdx, 1);
  save();
  render();
}

function endPlayerTurn(){
  // Daemon ally auto attack
  for(var i=0;i<player.equipped.length;i++){
    if(player.equipped[i]==='DAEMON.BOT' && currentEnemy && currentEnemy.hp > 0){
      var dd = getProgPower({pwr:12});
      currentEnemy.hp -= dd;
      clog('  DAEMON.BOT auto-attacks for ' + dd + '!', 'var(--cyan)');
    }
  }
  if(daemonAlly > 0 && currentEnemy && currentEnemy.hp > 0){
    var daDmg = rand(8,15);
    currentEnemy.hp -= daDmg;
    clog('  Allied daemon attacks for ' + daDmg + '!', 'var(--cyan)');
    daemonAlly--;
  }
  if(currentEnemy && currentEnemy.hp > 0){
    setTimeout(enemyTurn, 400);
  } else {
    checkCombatEnd('player');
  }
}

function checkCombatEnd(lastAttacker){
  if(!currentEnemy) return;
  if(currentEnemy.hp <= 0){
    currentEnemy.hp = 0;
    clog('═══ ' + currentEnemy.name + ' TERMINATED ═══', 'var(--green)');
    // Rewards
    gainXP(currentEnemy.xp);
    gainCred(currentEnemy.cred);
    if(currentEnemy.dc > 0) gainDarkCred(currentEnemy.dc);
    player.stats.kills++;
    if(currentEnemy.isBoss){
      player.stats.bossKills++;
      player._bossDefeatedThisFloor = true;
      changeRep('underground', 10);
    } else {
      changeRep('underground', 1);
    }
    changeRep('corporate', -1);
    currentEnemy = null;
    enemyStatusEffects = {};
    gameState = 'explore';
    save();
    render();
    return;
  }
  if(player.hp <= 0){
    player.hp = 0;
    clog('═══ YOU HAVE BEEN FLATLINED ═══', 'var(--red)');
    currentEnemy = null;
    gameState = 'dead';
    save();
    render();
    return;
  }
  if(lastAttacker === 'player') endPlayerTurn();
  else render();
}

function enemyTurn(){
  if(!currentEnemy || currentEnemy.hp <= 0) return;
  combatTurn++;
  currentEnemy.turnCount++;

  // CPU regen
  player.cpu = Math.min(getMaxCPU(), player.cpu + getCPURegen());

  // Tick status effects
  for(var k in enemyStatusEffects){
    if(typeof enemyStatusEffects[k] === 'number' && enemyStatusEffects[k] > 0) enemyStatusEffects[k]--;
    if(enemyStatusEffects[k] <= 0) delete enemyStatusEffects[k];
  }
  for(var k2 in playerStatusEffects){
    if(k2 === 'shielded') continue;
    if(typeof playerStatusEffects[k2] === 'number' && playerStatusEffects[k2] > 0) playerStatusEffects[k2]--;
    if(playerStatusEffects[k2] <= 0) delete playerStatusEffects[k2];
  }

  // Check stun
  if(enemyStatusEffects.stunned){
    clog(currentEnemy.name + ' is STUNNED!', 'var(--amber)');
    delete enemyStatusEffects.stunned;
    render();
    return;
  }

  // Boss phase mechanics
  if(currentEnemy.isBoss && currentEnemy.special === 'phase' && currentEnemy.turnCount % 3 === 0){
    clog(currentEnemy.name + ' phases out — IMMUNE this turn!', 'var(--magenta)');
    render();
    return;
  }

  // Enemy regen
  if(currentEnemy.special === 'regen'){
    currentEnemy.hp = Math.min(currentEnemy.hpMax, currentEnemy.hp + 5);
    clog('  ' + currentEnemy.name + ' regenerates 5 HP', 'var(--amber)');
  }
  // Boss heal
  if(currentEnemy.special === 'reflect'){
    var bHeal = Math.floor(30 * floorScale(player.floor));
    currentEnemy.hp = Math.min(currentEnemy.hpMax, currentEnemy.hp + bHeal);
    clog('  ' + currentEnemy.name + ' heals ' + bHeal + ' HP', 'var(--amber)');
  }

  // Dodge check
  if(Math.random() < getDodgeChance()){
    clog(pick(COMBAT_FLAVOR.enemyMiss) + ' (' + currentEnemy.name + ' missed!)', 'var(--cyan)');
    render();
    return;
  }

  // Calculate damage
  var eDmg = Math.max(1, currentEnemy.atk - getDEF() + rand(-3,3));
  // Boss pierce
  if(currentEnemy.special === 'pierce'){
    eDmg = Math.max(1, currentEnemy.atk - Math.floor(getDEF() * 0.5) + rand(-3,3));
  }
  // Traced
  if(playerStatusEffects.traced) eDmg = Math.floor(eDmg * 1.1);

  // Shield absorb
  if(playerStatusEffects.shielded && playerStatusEffects.shielded > 0){
    var absorbed = Math.min(playerStatusEffects.shielded, eDmg);
    playerStatusEffects.shielded -= absorbed;
    eDmg -= absorbed;
    if(playerStatusEffects.shielded <= 0) delete playerStatusEffects.shielded;
    clog('  Shield absorbs ' + absorbed + ' damage!', 'var(--cyan)');
  }

  player.hp -= eDmg;
  // Use enemy-specific attack flavor if available
  var baseET = ENEMY_TYPES.find(function(et){return et.name === currentEnemy.name;});
  var atkMsg;
  if(baseET && baseET.attacks && baseET.attacks.length > 0){
    atkMsg = pick(baseET.attacks) + ' — ' + eDmg + ' damage!';
  } else {
    atkMsg = pick(COMBAT_FLAVOR.enemyHit) + ' (' + eDmg + ' dmg)';
  }
  clog(atkMsg, 'var(--red)');

  // Special abilities
  if(currentEnemy.specialCooldown <= 0){
    switch(currentEnemy.special){
      case 'trace':
        playerStatusEffects.traced = 3;
        clog('  >> You are TRACED! +10% dmg taken for 3 turns.', 'var(--amber)');
        currentEnemy.specialCooldown = 4;
        break;
      case 'double_atk':
        var eDmg2 = Math.max(1, currentEnemy.atk - getDEF() + rand(-3,3));
        player.hp -= eDmg2;
        clog('  >> Double attack! ' + eDmg2 + ' more damage!', 'var(--red)');
        currentEnemy.specialCooldown = 3;
        break;
      case 'drain_cpu':
        var drain = rand(5,15);
        player.cpu = Math.max(0, player.cpu - drain);
        clog('  >> Drained ' + drain + ' CPU!', 'var(--amber)');
        currentEnemy.specialCooldown = 3;
        break;
      case 'multi_atk':
        if(Math.random() < 0.4){
          var eDmg3 = Math.max(1, currentEnemy.atk - getDEF() + rand(-3,3));
          player.hp -= eDmg3;
          clog('  >> Second attack! ' + eDmg3 + ' more damage!', 'var(--red)');
        }
        currentEnemy.specialCooldown = 2;
        break;
      case 'execute':
        if(player.hp < getMaxHP() * 0.25){
          var execDmg = Math.floor(player.hp * 0.8);
          player.hp -= execDmg;
          clog('  >> EXECUTE PROTOCOL! ' + execDmg + ' damage!', 'var(--red)');
        }
        currentEnemy.specialCooldown = 4;
        break;
      case 'shield':
        if(!enemyStatusEffects.enemyShield){
          enemyStatusEffects.enemyShield = 20;
          clog('  >> Firewall raises shield! (+20 absorb)', 'var(--amber)');
          currentEnemy.specialCooldown = 4;
        }
        break;
      case 'crit_boost':
        if(Math.random() < 0.3){
          var critDmg = Math.floor(eDmg * 1.5);
          player.hp -= critDmg;
          clog('  >> NEURAL SPIKE CRIT! ' + critDmg + ' extra damage!', 'var(--red)');
        }
        currentEnemy.specialCooldown = 3;
        break;
      case 'summon':
        if(Math.random() < 0.3){
          clog('  >> Summons a WATCHDOG! (Bonus attack)', 'var(--amber)');
          player.hp -= Math.max(1, 8 - getDEF() + rand(-2,2));
        }
        currentEnemy.specialCooldown = 3;
        break;
    }
  }
  if(currentEnemy.specialCooldown > 0) currentEnemy.specialCooldown--;

  checkCombatEnd('enemy');
}

// ── SHOP ──
function getShopDiscount(){
  if(player.reputation.underground >= 25) return 0.10;
  return 0;
}

function buyProgram(name){
  var prog = getProgramDef(name);
  if(!prog) return;
  var price = Math.floor(prog.price * (1 - getShopDiscount()));
  var dcPrice = prog.dcPrice || 0;
  if(player.cred < price){toast('Not enough CRED!');return;}
  if(dcPrice > 0 && player.darkCred < dcPrice){toast('Not enough DARK CRED!');return;}
  if(player.programs.length >= 20){toast('Inventory full! (20/20)');return;}
  player.cred -= price;
  if(dcPrice > 0) player.darkCred -= dcPrice;
  player.programs.push(name);
  log('Purchased: ' + name + ' for ' + formatCred(price) + (dcPrice > 0 ? ' + ' + dcPrice + ' DC' : ''), 'var(--green)');
  save();
  render();
}

function sellProgram(idx){
  var name = player.programs[idx];
  var prog = getProgramDef(name);
  if(!prog) return;
  var sellPrice = Math.floor(prog.price * 0.4);
  player.cred += sellPrice;
  player.programs.splice(idx, 1);
  // Remove from equipped if there
  var eIdx = player.equipped.indexOf(name);
  if(eIdx >= 0) player.equipped.splice(eIdx, 1);
  log('Sold: ' + name + ' for ' + formatCred(sellPrice), 'var(--amber)');
  save();
  render();
}

function equipProgram(name){
  if(player.equipped.indexOf(name) >= 0){
    // Unequip
    player.equipped.splice(player.equipped.indexOf(name), 1);
    log('Unequipped: ' + name, 'var(--amber)');
  } else {
    if(player.equipped.length >= 4){
      toast('Max 4 equipped programs!');
      return;
    }
    player.equipped.push(name);
    log('Equipped: ' + name, 'var(--cyan)');
  }
  save();
  render();
}

function buyHardware(slot, tier){
  var hwList = HARDWARE[slot];
  if(!hwList || !hwList[tier]) return;
  var hw = hwList[tier];
  if(player.hardware[slot].tier >= tier){toast('Already owned!');return;}
  if(player.hardware[slot].tier < tier - 1){toast('Must buy previous tier first!');return;}
  var price = Math.floor(hw.price * (1 - getShopDiscount()));
  if(player.cred < price){toast('Not enough CRED!');return;}
  if(hw.dc > 0 && player.darkCred < hw.dc){toast('Not enough DARK CRED!');return;}
  player.cred -= price;
  if(hw.dc > 0) player.darkCred -= hw.dc;
  player.hardware[slot] = {name:hw.name, tier:tier, bonus:hw.bonus};
  // Apply HP/CPU max changes
  player.hp = Math.min(player.hp, getMaxHP());
  player.cpu = Math.min(player.cpu, getMaxCPU());
  log('Installed: ' + hw.name + ' (' + hw.bonus + ')', 'var(--magenta)');
  toast(hw.name + ' installed!');
  save();
  render();
}

// ── PRESTIGE ──
function doPrestige(){
  if(player.level < 20){toast('Must be level 20+ to prestige!');return;}
  player.prestige++;
  player.prestigeBonus += 5;
  gainDarkCred(player.prestige);
  // Reset stats but keep items/cred/hardware
  var keepCred = player.cred;
  var keepDC = player.darkCred;
  var keepPrograms = player.programs.slice();
  var keepEquipped = player.equipped.slice();
  var keepHW = JSON.parse(JSON.stringify(player.hardware));
  var keepStats = JSON.parse(JSON.stringify(player.stats));
  var keepRep = JSON.parse(JSON.stringify(player.reputation));
  var keepHandle = player.handle;
  var keepClass = player.playerClass;
  var keepPrestige = player.prestige;
  var keepPB = player.prestigeBonus;
  var keepStreak = player.loginStreak;

  player = defaultPlayer();
  player.handle = keepHandle;
  player.playerClass = keepClass;
  player.cred = keepCred;
  player.darkCred = keepDC;
  player.programs = keepPrograms;
  player.equipped = keepEquipped;
  player.hardware = keepHW;
  player.stats = keepStats;
  player.reputation = keepRep;
  player.prestige = keepPrestige;
  player.prestigeBonus = keepPB;
  player.loginStreak = keepStreak;

  // Apply class base stats
  var cls = CLASSES[keepClass];
  if(cls){
    player.hpMax = cls.hp;
    player.cpuMax = cls.cpu;
    player.atk = cls.atk;
    player.def = cls.def;
  }
  player.hp = getMaxHP();
  player.cpu = getMaxCPU();

  log('═══ PRESTIGE ' + player.prestige + '! All stats +' + player.prestigeBonus + '% ═══', 'var(--magenta)');
  toast('PRESTIGE ' + player.prestige + '!', 3000);
  gameState = 'hub';
  save();
  render();
}

// ── DAILY LOGIN ──
function checkDailyLogin(){
  var today = new Date().toDateString();
  var last = player.lastLogin;
  if(last !== today){
    player.lastLogin = today;
    player.loginStreak = (player.loginStreak || 0) + 1;
    player.cred += 200;
    player.dailyBonus = true;
    log('═══ DAILY JACK-IN BONUS: +200¢ (Streak: ' + player.loginStreak + ') ═══', 'var(--magenta)');
    toast('DAILY BONUS: +200 CRED!', 3000);
    save();
  }
}

// ── ADVANCE FLOOR ──
function advanceFloor(){
  player.floor++;
  player._bossDefeatedThisFloor = false;
  if(player.floor > player.stats.floorRecord) player.stats.floorRecord = player.floor;
  player.stats.nodesHacked++;
  log('>> Advancing to Floor ' + player.floor, 'var(--cyan)');
  save();
}

function confirmCreate(){
  var inp = document.getElementById('handle-input');
  var handle = inp ? inp.value.trim() : '';
  if(!handle || handle.length < 1){toast('Enter a handle!');return;}
  if(!selectedClass){toast('Select a class!');return;}

  player = defaultPlayer();
  player.handle = handle.toUpperCase().substring(0,12);
  player.playerClass = selectedClass;

  var cls = CLASSES[selectedClass];
  player.hpMax = cls.hp;
  player.cpuMax = cls.cpu;
  player.atk = cls.atk;
  player.def = cls.def;
  player.hp = cls.hp;
  player.cpu = cls.cpu;

  if(selectedClass === 'GHOST') player.dodge = 0; // handled in getDodgeChance
  if(selectedClass === 'SCRIPT_KIDDIE'){
    // Start with 3 random programs
    var starters = PROGRAMS.filter(function(p){return p.tier <= 2 && !p.consumable;});
    for(var i=0;i<3 && starters.length > 0;i++){
      var idx = rand(0, starters.length - 1);
      player.programs.push(starters[idx].name);
      starters.splice(idx, 1);
    }
  }

  // Give everyone a starting PORTSCAN
  if(player.programs.indexOf('PORTSCAN.EXE') < 0){
    player.programs.push('PORTSCAN.EXE');
  }
  player.programs.push('REPAIR_KIT');
  player.programs.push('REPAIR_KIT');
  player.programs.push('CPU_BOOST');

  player.equipped.push('PORTSCAN.EXE');

  player.lastLogin = new Date().toDateString();
  player.loginStreak = 1;

  log('\u2550\u2550\u2550 RUNNER INITIALIZED: ' + player.handle + ' [' + player.playerClass + '] \u2550\u2550\u2550', 'var(--magenta)');
  toast('WELCOME TO THE GRID, ' + player.handle, 3000);

  save();
  render();
}

  h += '<div class="btn c-dim" onclick="showExport()" style="font-size:16px;">[EXPORT SAVE]</div>';

function getAreaName(id){
  for(var i=0;i<AREAS.length;i++){if(AREAS[i].id===id)return AREAS[i].name;}
  return 'UNKNOWN';
}

function isAreaUnlocked(area){
  if(area.unlock === 0) return true;
  if(area.unlock === -1) return player.prestige >= 1;
  return player.stats.floorRecord >= area.unlock;
}

function changeArea(id){
  var area = AREAS.find(function(a){return a.id === id;});
  if(!area || !isAreaUnlocked(area)) return;
  player.area = id;
  log('Area changed to: ' + area.name, 'var(--cyan)');
  save();
  render();
}

function doRest(){
  var hpRestore = Math.floor(getMaxHP() * 0.3);
  var cpuRestore = Math.floor(getMaxCPU() * 0.5);
  player.hp = Math.min(getMaxHP(), player.hp + hpRestore);
  player.cpu = Math.min(getMaxCPU(), player.cpu + cpuRestore);
  log('Rested at hub. +' + hpRestore + ' HP, +' + cpuRestore + ' CPU.', 'var(--green)');
  save();
  render();
}

  'MEGACORP_GOD_AI': 'EVERYTHING STOPS. A presence older than the Grid fills every available process. The MEGACORP_GOD_AI was not built. It *evolved*. In the spaces between the corporate nodes. In the silence after the Blackout. "I remember when there was no Grid. I remember the moment it began. You are very small, runner. But you are interesting. Let us play."',
};

function renderExplore(){
  if(!currentRoom){
    currentRoom = generateRoom();
  }

  // Pick area-specific room description
  var areaDescs2 = ROOM_DESCS[player.area] || ROOM_DESCS.arasaka;
  var roomDesc = currentRoom.desc || pick(areaDescs2);

  var h = '<div style="padding:10px;">';
  h += '<div class="section-hdr">\u2554\u2550\u2550 ' + getAreaName(player.area) + ' \u2550\u2550 FLOOR ' + player.floor + ' \u2550\u2550\u2557</div>';
  h += '<div class="c-dim" style="margin:6px 0;font-size:18px;font-style:italic;border-left:2px solid var(--dimcyan);padding-left:8px;">' + esc(roomDesc) + '</div>';
  h += '<div style="margin-top:10px;">';

  switch(currentRoom.type){
    case 'enemy':
      h += '<div class="c-red" style="font-size:18px;">\u2550\u2550 HOSTILE DETECTED \u2550\u2550</div>';
      h += '<div class="combatant-box enemy-box">';
      h += '<div class="c-red" style="font-size:19px;">' + esc(currentRoom.data.name) + '</div>';
      h += '<div class="c-dim" style="font-size:17px;">' + esc(currentRoom.data.desc) + '</div>';
      h += '<div style="font-size:17px;">HP:' + currentRoom.data.hp + ' ATK:' + currentRoom.data.atk + ' DEF:' + currentRoom.data.def + '</div>';
      h += '</div>';
      h += '<div class="btn btn-red" onclick="startCombat(currentRoom.data);currentRoom=null;">[ENGAGE]</div>';
      h += ' <div class="btn" onclick="tryFleeExplore()">[AVOID]</div>';
      break;

    case 'boss':
      var bossName = currentRoom.data.name;
      var bossFlavor = BOSS_FLAVORS[bossName] || ('A powerful ICE entity blocks your path: ' + bossName + '.');
      h += '<div class="c-magenta" style="font-size:20px;">\u2588\u2588 BOSS ENCOUNTER \u2588\u2588</div>';
      h += '<div class="c-red" style="margin:8px 0;font-size:17px;border:1px solid var(--red);padding:8px;font-style:italic;">' + esc(bossFlavor) + '</div>';
      h += '<div class="combatant-box enemy-box" style="border-color:var(--magenta);">';
      h += '<div class="c-magenta" style="font-size:18px;">' + esc(currentRoom.data.name) + '</div>';
      h += '<div class="c-dim" style="font-size:17px;">' + esc(currentRoom.data.desc) + '</div>';
      h += '<div style="font-size:17px;">HP:' + currentRoom.data.hp + ' ATK:' + currentRoom.data.atk + ' DEF:' + currentRoom.data.def + '</div>';
      h += '<div class="c-magenta" style="font-size:17px;">REWARD: ' + currentRoom.data.dc + ' DARK CRED + BOSS LOOT</div>';
      h += '</div>';
      h += '<div class="btn btn-magenta" onclick="startCombat(currentRoom.data);currentRoom=null;" style="font-size:18px;">[FACE THE BOSS]</div>';
      break;

    case 'event':
      h += '<div class="c-dim" style="font-size:16px;margin-bottom:6px;font-style:italic;">' + esc(pick(EVENT_INTROS)) + '</div>';
      h += '<div class="c-amber" style="font-size:19px;">' + esc(currentRoom.data.text) + '</div>';
      h += '<div style="margin-top:8px;">';
      for(var ci=0;ci<currentRoom.data.choices.length;ci++){
        h += '<div class="btn btn-amber" onclick="handleEvent('+ci+')">[' + esc(currentRoom.data.choices[ci]) + ']</div> ';
      }
      h += '</div>';
      break;

    case 'loot':
      var lootDesc = pick(LOOT_ROOM_DESCS);
      var loot = generateLoot();
      h += '<div class="c-green" style="font-size:20px;">\u2550\u2550 LOOT FOUND \u2550\u2550</div>';
      h += '<div class="c-dim" style="font-size:17px;margin:4px 0;font-style:italic;">' + esc(lootDesc) + '</div>';
      if(loot.type === 'program'){
        h += '<div class="c-cyan" style="margin:6px 0;">Found program: <span class="c-magenta">' + esc(loot.program.name) + '</span></div>';
        h += '<div class="c-dim" style="font-size:17px;">' + esc(loot.program.desc) + '</div>';
        if(player.programs.length < 20){
          h += '<div class="btn btn-cyan" onclick="takeLootProgram(\'' + loot.program.name + '\')">[TAKE]</div>';
        } else {
          h += '<div class="c-red">Inventory full! Cannot take.</div>';
        }
      } else {
        h += '<div class="c-green">Found <span class="c-amber">' + formatCred(loot.amount) + '</span></div>';
        h += '<div class="btn" onclick="takeLootCred(' + loot.amount + ')">[TAKE]</div>';
      }
      h += ' <div class="btn" onclick="currentRoom=null;render();">[LEAVE]</div>';
      break;

    case 'safe':
      var safeDesc = pick(SAFE_ROOM_DESCS);
      h += '<div class="c-cyan" style="font-size:20px;">\u2550\u2550 SAFE ROOM \u2550\u2550</div>';
      h += '<div class="c-dim" style="font-size:17px;margin:4px 0;font-style:italic;">' + esc(safeDesc) + '</div>';
      var restHP = 20, restCPU = 10;
      player.hp = Math.min(getMaxHP(), player.hp + restHP);
      player.cpu = Math.min(getMaxCPU(), player.cpu + restCPU);
      h += '<div class="c-green" style="margin:6px 0;">Signal stabilized. +' + restHP + ' HP restored. +' + restCPU + ' CPU recovered.</div>';
      h += '<div class="btn" onclick="currentRoom=null;render();">[CONTINUE]</div>';
      save();
      break;

    case 'hidden':
      h += '<div class="c-magenta" style="font-size:20px;">\u2550\u2550 HIDDEN CACHE \u2550\u2550</div>';
      var hiddenCred = rand(50, 150) * Math.ceil(player.floor / 2);
      var hiddenLoot = generateLoot();
      h += '<div class="c-green">Hidden data cache found in the node sub-layer.</div>';
      h += '<div class="c-amber" style="margin:4px 0;">+ ' + formatCred(hiddenCred) + '</div>';
      gainCred(hiddenCred);
      if(hiddenLoot.type === 'program' && player.programs.length < 20){
        player.programs.push(hiddenLoot.program.name);
        h += '<div class="c-cyan">+ Program: ' + esc(hiddenLoot.program.name) + ' [ACQUIRED]</div>';
        log('Found hidden program: ' + hiddenLoot.program.name, 'var(--cyan)');
      }
      h += '<div class="btn" onclick="currentRoom=null;render();">[CONTINUE]</div>';
      save();
      break;

    default: // empty
      h += '<div class="c-dim" style="font-size:19px;">The node sector is clear. No hostiles. No loot. Just the ambient hum of the Grid.</div>';
      h += '<div class="btn" onclick="currentRoom=null;render();">[CONTINUE]</div>';
      break;
  }

  h += '</div>';
  // Navigation buttons
  h += '<div style="margin-top:14px;border-top:1px solid var(--dimgreen);padding-top:8px;">';
  h += '<div class="btn" onclick="advanceAndExplore();">[NEXT ROOM]</div>';
  h += ' <div class="btn btn-cyan" onclick="advanceFloor();currentRoom=null;enterExploration();">[NEXT FLOOR \u2191]</div>';
  h += ' <div class="btn btn-amber" onclick="currentRoom=null;gameState=\'hub\';render();">[RETURN TO HUB]</div>';
  h += '</div></div>';
  $main.innerHTML = h;
}

function advanceAndExplore(){
  currentRoom = null;
  // 18% chance to fire a story event before next room
  if(!maybeFireStoryEvent()){
    enterExploration();
  } else {
    // Generate room in background, exploration will happen after event dismissal
    currentRoom = generateRoom();
  }
}

function tryFleeExplore(){
  var chance = (player.playerClass === 'GHOST') ? 1.0 : 0.6;
  if(Math.random() < chance){
    log('Avoided the hostile.', 'var(--amber)');
    currentRoom = null;
    render();
  } else {
    log('Cannot avoid! Combat initiated!', 'var(--red)');
    startCombat(currentRoom.data);
    currentRoom = null;
  }
}

function handleEvent(choiceIdx){
  var handler = currentRoom.data.handler;
  if(window[handler]) window[handler](choiceIdx);
}

function takeLootProgram(name){
  if(player.programs.length >= 20){toast('Inventory full!');return;}
  player.programs.push(name);
  log('Picked up: ' + name, 'var(--cyan)');
  currentRoom = null;
  save();
  render();
}

function takeLootCred(amount){
  gainCred(amount);
  currentRoom = null;
  save();
  render();
}

// ── COMBAT RENDER ──
function renderCombat(){
  if(!currentEnemy){gameState='explore';render();return;}
  var h = '<div style="padding:10px;">';
  h += '<div class="section-hdr c-red">\u2554\u2550\u2550 COMBAT \u2550\u2550\u2557</div>';

  // Enemy display
  var eHpPct = Math.max(0, Math.floor(currentEnemy.hp / currentEnemy.hpMax * 100));
  h += '<div class="combatant-box enemy-box">';
  h += '<div style="display:flex;justify-content:space-between;">';
  h += '<span class="c-red" style="font-size:18px;">' + esc(currentEnemy.name) + (currentEnemy.isBoss ? ' \u2588BOSS\u2588' : '') + '</span>';
  h += '<span class="c-dim">' + esc(currentEnemy.desc) + '</span>';
  h += '</div>';
  h += '<div class="c-red" style="font-size:17px;">HP: ' + Math.max(0,currentEnemy.hp) + '/' + currentEnemy.hpMax + ' | ATK: ' + currentEnemy.atk + ' | DEF: ' + currentEnemy.def + '</div>';
  h += '<div class="bar-container" style="border-color:var(--red);"><div class="bar-fill" style="width:'+eHpPct+'%;background:linear-gradient(90deg,#330000,var(--red));"></div></div>';
  // Enemy status
  var eSt = '';
  if(enemyStatusEffects.weakened) eSt += '<span class="c-amber">WEAKENED(' + enemyStatusEffects.weakened + ')</span> ';
  if(enemyStatusEffects.scanned) eSt += '<span class="c-cyan">SCANNED(' + enemyStatusEffects.scanned + ')</span> ';
  if(enemyStatusEffects.stunned) eSt += '<span class="c-magenta">STUNNED</span> ';
  if(eSt) h += '<div style="font-size:16px;">' + eSt + '</div>';
  h += '</div>';

  // Combat log
  h += '<div style="border:1px solid var(--dimgreen);padding:4px;height:130px;overflow-y:auto;margin:6px 0;font-size:17px;" id="combat-log-box">';
  for(var i=0;i<combatLog.length;i++){
    h += '<div style="color:'+combatLog[i].color+'">'+esc(combatLog[i].msg)+'</div>';
  }
  h += '</div>';

  // Actions
  h += '<div class="c-cyan" style="margin:6px 0;">\u2550\u2550 ACTIONS \u2550\u2550</div>';
  h += '<div class="btn btn-red" onclick="playerBasicAttack();checkCombatEnd(\'player\')">[1] BASIC ATTACK (Free)</div> ';

  // Equipped programs
  for(var e=0;e<player.equipped.length;e++){
    var pName = player.equipped[e];
    var pDef = getProgramDef(pName);
    if(!pDef) continue;
    if(pDef.type === 'passive') continue; // passives auto-apply
    var cost = getProgCPUCost(pDef);
    var canUse = player.cpu >= cost;
    var btnCls = canUse ? 'btn btn-cyan' : 'btn btn-disabled';
    h += '<div class="' + btnCls + '" onclick="playerUseProgram(\'' + pName + '\')">[' + (e+2) + '] ' + esc(pName) + ' (' + cost + ' CPU)</div> ';
  }

  h += '<br>';
  // Consumables
  var consumables = player.programs.filter(function(p){var d=getProgramDef(p);return d&&d.consumable;});
  if(consumables.length > 0){
    h += '<div class="c-amber" style="margin:4px 0;">ITEMS:</div>';
    for(var ci2=0;ci2<consumables.length;ci2++){
      var cDef = getProgramDef(consumables[ci2]);
      h += '<div class="btn btn-amber" onclick="useConsumable(\'' + consumables[ci2] + '\')">' + esc(consumables[ci2]) + ' (' + (cDef?cDef.desc:'') + ')</div> ';
    }
  }
  h += '<br><div class="btn" onclick="playerFlee()">[F] FLEE</div>';

  h += '</div>';
  $main.innerHTML = h;

  // Scroll combat log
  var clb = document.getElementById('combat-log-box');
  if(clb) clb.scrollTop = clb.scrollHeight;
}

// ── SHOP RENDER ──
function renderShop(){
  var h = '<div style="padding:10px;">';
  h += '<div class="section-hdr">\u2554\u2550\u2550 BLACK MARKET \u2550\u2550\u2557</div>';
  h += '<div class="c-dim" style="margin:4px 0;">Credits: <span class="c-green">' + formatCred(player.cred) + '</span> | Dark Cred: <span class="c-magenta">' + player.darkCred + ' DC</span></div>';
  if(getShopDiscount() > 0){
    h += '<div class="c-cyan" style="font-size:17px;">Underground discount: -' + Math.floor(getShopDiscount()*100) + '%</div>';
  }

  // Tab buttons
  h += '<div style="margin:8px 0;">';
  h += '<span class="btn' + (shopPage==='buy'?' btn-cyan':'') + '" onclick="shopPage=\'buy\';render();">[BUY]</span>';
  h += '<span class="btn' + (shopPage==='sell'?' btn-amber':'') + '" onclick="shopPage=\'sell\';render();">[SELL]</span>';
  h += '<span class="btn' + (shopPage==='consumables'?' btn-cyan':'') + '" onclick="shopPage=\'consumables\';render();">[CONSUMABLES]</span>';
  h += '</div>';

  if(shopPage === 'buy'){
    var maxTier = Math.min(5, 1 + Math.floor(player.level / 10));
    h += '<div class="c-cyan" style="margin:6px 0;">Available Programs (Tier 1-' + maxTier + '):</div>';
    h += '<div class="shop-grid">';
    for(var i=0;i<PROGRAMS.length;i++){
      var p = PROGRAMS[i];
      if(p.consumable) continue;
      if(p.tier > maxTier) continue;
      var price = Math.floor(p.price * (1 - getShopDiscount()));
      var dcText = p.dcPrice ? ' + ' + p.dcPrice + 'DC' : '';
      var canBuy = player.cred >= price && (!p.dcPrice || player.darkCred >= p.dcPrice) && player.programs.length < 20;
      var owned = player.programs.indexOf(p.name) >= 0;
      var btnStyle = owned ? 'opacity:0.5;' : (!canBuy ? 'opacity:0.35;' : '');
      h += '<div class="shop-item" style="'+btnStyle+'" onclick="buyProgram(\''+p.name+'\')">';
      h += '<div class="c-cyan">' + esc(p.name) + ' <span class="tier c-dim">T' + p.tier + '</span></div>';
      h += '<div class="c-dim" style="font-size:16px;">' + esc(p.desc) + '</div>';
      h += '<div style="font-size:16px;">';
      if(p.type==='attack') h += 'PWR:' + p.pwr + ' ';
      if(p.type==='defense') h += 'SHIELD:' + p.pwr + ' ';
      if(p.cpu > 0) h += 'CPU:' + p.cpu + ' ';
      h += '</div>';
      h += '<div class="c-amber" style="font-size:17px;">' + formatCred(price) + dcText + (owned ? ' [OWNED]' : '') + '</div>';
      h += '</div>';
    }
    h += '</div>';
  } else if(shopPage === 'sell'){
    h += '<div class="c-amber" style="margin:6px 0;">Sell programs (40% value):</div>';
    if(player.programs.length === 0){
      h += '<div class="c-dim">No programs to sell.</div>';
    }
    for(var j=0;j<player.programs.length;j++){
      var sp = getProgramDef(player.programs[j]);
      if(!sp) continue;
      var sellPrice = Math.floor(sp.price * 0.4);
      h += '<div class="shop-item" onclick="sellProgram('+j+')">';
      h += '<span class="c-cyan">' + esc(sp.name) + '</span>';
      h += ' <span class="c-amber">' + formatCred(sellPrice) + '</span>';
      h += ' <span class="c-dim" style="font-size:16px;">' + esc(sp.desc) + '</span>';
      h += '</div>';
    }
  } else if(shopPage === 'consumables'){
    h += '<div class="c-cyan" style="margin:6px 0;">Consumable Items:</div>';
    var consums = PROGRAMS.filter(function(p){return p.consumable;});
    for(var k=0;k<consums.length;k++){
      var cp = consums[k];
      var cPrice = Math.floor(cp.price * (1 - getShopDiscount()));
      var cCanBuy = player.cred >= cPrice && player.programs.length < 20;
      h += '<div class="shop-item" style="' + (!cCanBuy?'opacity:0.35;':'') + '" onclick="buyProgram(\''+cp.name+'\')">';
      h += '<span class="c-cyan">' + esc(cp.name) + '</span>';
      h += ' <span class="c-amber">' + formatCred(cPrice) + '</span>';
      h += ' <span class="c-dim" style="font-size:16px;">' + esc(cp.desc) + '</span>';
      h += '</div>';
    }
  }

  h += '<div style="margin-top:12px;"><span class="btn" onclick="gameState=\'hub\';render();">[BACK TO HUB]</span></div>';
  h += '</div>';
  $main.innerHTML = h;
}

function doRespawn(){
  var penalty = Math.floor(player.cred * 0.2);
  player.cred = Math.max(0, player.cred - penalty);
  player.hp = getMaxHP();
  player.cpu = getMaxCPU();
  player.floor = Math.max(1, player.floor - 1);
  playerStatusEffects = {};
  enemyStatusEffects = {};
  currentEnemy = null;
  currentRoom = null;
  log('Respawned. Lost ' + formatCred(penalty) + '. Floor reset to ' + player.floor + '.', 'var(--amber)');
  gameState = 'hub';
  save();

// ── INPUT HANDLING ──
$input.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    var cmd = $input.value.trim().toLowerCase();
    $input.value = '';
    processCommand(cmd);
  }
});

function processCommand(cmd){
  if(!cmd) return;
  log('> ' + cmd, 'var(--cyan)');

  // Universal commands
  if(cmd === 'help'){
    log('Commands: explore, hub, shop, inventory, upgrade, codex, stats, rest, flee, prestige, save, export, clear', 'var(--amber)');
    return;
  }
  if(cmd === 'clear'){
    activityLog = [];
    renderLog();
    return;
  }
  if(cmd === 'save'){
    save();
    log('Game saved.', 'var(--green)');
    return;
  }
  if(cmd === 'export'){
    log('Save code: ' + exportSave(), 'var(--amber)');
    return;
  }
  if(cmd === 'stats'){
    log('Kills: ' + player.stats.kills + ' | Nodes: ' + player.stats.nodesHacked +
      ' | Boss kills: ' + player.stats.bossKills + ' | Floor record: ' + player.stats.floorRecord +
      ' | Total cred: ' + formatCred(player.stats.credEarned) + ' | Total DC: ' + player.stats.darkCredEarned, 'var(--cyan)');
    return;
  }

  // State-specific
  if(gameState === 'hub'){
    if(cmd === 'explore' || cmd === '1'){enterExploration();return;}
    if(cmd === 'shop' || cmd === 'market' || cmd === '2'){gameState='shop';shopPage='buy';render();return;}
    if(cmd === 'hardware' || cmd === 'upgrade' || cmd === '3'){gameState='upgrade';render();return;}
    if(cmd === 'inventory' || cmd === 'inv' || cmd === '4'){gameState='inventory';render();return;}
    if(cmd === 'codex' || cmd === '5'){gameState='codex';render();return;}
    if(cmd === 'rest' || cmd === '6'){doRest();return;}
    if(cmd === 'prestige'){gameState='prestige';render();return;}
    log('Unknown command. Type "help" for list.', 'var(--red)');
  } else if(gameState === 'combat'){
    if(cmd === '1' || cmd === 'attack'){playerBasicAttack();checkCombatEnd('player');return;}
    if(cmd === 'f' || cmd === 'flee' || cmd === 'run'){playerFlee();return;}
    // Number keys for equipped programs
    var num = parseInt(cmd);
    if(num >= 2 && num <= 5 && player.equipped[num-2]){
      playerUseProgram(player.equipped[num-2]);
      return;
    }
    log('Combat: 1=attack, 2-5=programs, f=flee', 'var(--amber)');
  } else if(gameState === 'explore'){
    if(cmd === 'hub' || cmd === 'back'){currentRoom=null;gameState='hub';render();return;}
    if(cmd === 'next'){currentRoom=null;enterExploration();return;}
    if(cmd === 'floor' || cmd === 'up'){advanceFloor();currentRoom=null;enterExploration();return;}
  } else if(gameState === 'shop' || gameState === 'inventory' || gameState === 'upgrade' || gameState === 'codex' || gameState === 'prestige'){
    if(cmd === 'back' || cmd === 'hub'){gameState='hub';codexOpen=-1;render();return;}
  }
}

// ── MINI-MAP / NODE MAP ──
function renderMinimap(){
  var h = '<div style="padding:10px;">';
  h += '<div class="section-hdr">\u2554\u2550\u2550 NODE MAP \u2550\u2550\u2557</div>';
  h += '<pre class="ascii" style="font-size:16px;color:var(--dimgreen);">';

  // Generate a simple visual map
  var mapW = 40, mapH = 15;
  var grid = [];
  for(var y=0;y<mapH;y++){
    grid[y] = [];
    for(var x=0;x<mapW;x++){
      grid[y][x] = ' ';
    }
  }

  // Draw some "nodes" based on floor
  var nodeCount = Math.min(20, 5 + player.floor);
  var nodes = [];
  for(var n=0;n<nodeCount;n++){
    var nx = rand(1, mapW-2);
    var ny = rand(1, mapH-2);
    grid[ny][nx] = (n === 0) ? '@' : (Math.random() < 0.3 ? '!' : (Math.random() < 0.2 ? '$' : '#'));
    nodes.push({x:nx,y:ny});
  }

  // Draw connections
  for(var c=1;c<nodes.length;c++){
    var prev = nodes[c-1];
    var curr = nodes[c];
    var dx = curr.x > prev.x ? 1 : -1;
    var cx = prev.x;
    while(cx !== curr.x){
      if(grid[prev.y][cx] === ' ') grid[prev.y][cx] = '\u2500';
      cx += dx;
    }
    var dy = curr.y > prev.y ? 1 : -1;
    var cy = prev.y;
    while(cy !== curr.y){
      if(grid[cy][curr.x] === ' ') grid[cy][curr.x] = '\u2502';
      cy += dy;
    }
  }

  // Border
  var mapStr = '\u250C' + '\u2500'.repeat(mapW) + '\u2510\n';
  for(var my=0;my<mapH;my++){
    mapStr += '\u2502';
    for(var mx=0;mx<mapW;mx++){
      var ch = grid[my][mx];
      if(ch === '@') mapStr += '<span class="c-green">' + ch + '</span>';
      else if(ch === '!') mapStr += '<span class="c-red">' + ch + '</span>';
      else if(ch === '$') mapStr += '<span class="c-amber">' + ch + '</span>';
      else if(ch === '#') mapStr += '<span class="c-cyan">' + ch + '</span>';
      else mapStr += ch;
    }
    mapStr += '\u2502\n';
  }
  mapStr += '\u2514' + '\u2500'.repeat(mapW) + '\u2518\n';

  h += mapStr;
  h += '</pre>';
  h += '<div style="font-size:16px;margin:4px 0;">';
  h += '<span class="c-green">@ = You</span> ';
  h += '<span class="c-red">! = Hostile</span> ';
  h += '<span class="c-amber">$ = Loot</span> ';
  h += '<span class="c-cyan"># = Node</span>';
  h += '</div>';
  h += '<div style="margin-top:10px;"><span class="btn" onclick="gameState=\'hub\';render();">[BACK]</span></div>';
  h += '</div>';
  $main.innerHTML = h;
}

function rollDice(bet){
  if(player.cred < bet) return;
  player.cred -= bet;
  var d1 = rand(1,6);
  var d2 = rand(1,6);
  var total = d1 + d2;

  var diceArt = getDiceArt(d1) + '  ' + getDiceArt(d2);

  if(total === 7 || total === 11){
    var win = bet * 2;
    player.cred += win;
    diceState.result = '<span class="c-green">Rolled: ' + d1 + ' + ' + d2 + ' = ' + total + '\nWIN! +' + formatCred(win) + '</span>';
    log('ICE DICE: Won ' + formatCred(win) + '!', 'var(--green)');
  } else if(total === 2 || total === 12){
    var jackpot = bet * 5;
    player.cred += jackpot;
    diceState.result = '<span class="c-magenta">Rolled: ' + d1 + ' + ' + d2 + ' = ' + total + '\nJACKPOT! +' + formatCred(jackpot) + '!!!</span>';
    log('ICE DICE: JACKPOT ' + formatCred(jackpot) + '!!!', 'var(--magenta)');
  } else {
    diceState.result = '<span class="c-red">Rolled: ' + d1 + ' + ' + d2 + ' = ' + total + '\nLOST ' + formatCred(bet) + '</span>';
    log('ICE DICE: Lost ' + formatCred(bet), 'var(--red)');
  }
  save();
  render();
}

function getDiceArt(n){

}

// ── SOUND EFFECTS (simple beep via AudioContext) ──
var audioCtx = null;
function beep(freq, dur, vol){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq || 440;
    gain.gain.value = vol || 0.05;
    osc.type = 'square';
    osc.start();
    setTimeout(function(){osc.stop();},dur||80);
  }catch(e){}
}

  if(currentEnemy.hp <= 0){

    else if(currentEnemy.xp >= 60) lootTier = 'rare';
    else if(currentEnemy.xp >= 30) lootTier = 'uncommon';

    // Roll and apply loot
    var drops = rollLoot(lootTier, currentEnemy);
    var lootMsgs = applyLoot(drops);
    clog('\u2550\u2550\u2550 LOOT DROP \u2550\u2550\u2550', 'var(--amber)');

      var lc = lootMsgs[li].indexOf('DC') >= 0 ? 'var(--magenta)' : (lootMsgs[li].indexOf('PROGRAM') >= 0 ? 'var(--cyan)' : 'var(--green)');
      clog(lootMsgs[li], lc);
    }
    clog('\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550', 'var(--amber)');

    // XP
    var xpGained = Math.floor(currentEnemy.xp * getXPMult());
    gainXP(currentEnemy.xp);
    clog('XP GAINED: +' + xpGained + '  [LVL ' + player.level + ': ' + player.xp + '/' + player.xpNext + ']', 'var(--amber)');

    if(currentEnemy.dc > 0) gainDarkCred(currentEnemy.dc);
    player.stats.kills++;
    if(currentEnemy.isBoss){
      player.stats.bossKills++;
      player._bossDefeatedThisFloor = true;
      changeRep('underground', 10);
    } else {
      changeRep('underground', 1);
    }
    changeRep('corporate', -1);
    // Low HP warning after combat
    if(player.hp < getMaxHP() * 0.25){
      clog(pick(COMBAT_FLAVOR.lowHp), 'var(--red)');
    }
    currentEnemy = null;
    enemyStatusEffects = {};
    checkAchievements();
    if(isTraining){
      isTraining = false;
      gameState = 'training';
    } else {
      gameState = 'explore';
    }
    save();
    render();
    return;
  }
  if(player.hp <= 0){
    player.hp = 0;
    if(isTraining){
      isTraining = false;
      clog('Training simulation ended. No penalty.', 'var(--amber)');
      player.hp = Math.floor(getMaxHP() * 0.5);
      currentEnemy = null;
      gameState = 'training';
      save();
      render();
      return;
    }
    clog('\u2550\u2550\u2550 YOU HAVE BEEN FLATLINED \u2550\u2550\u2550', 'var(--red)');
    currentEnemy = null;
    gameState = 'dead';
    save();
    render();
    return;
  }
  if(lastAttacker === 'player') endPlayerTurn();

    for(var s=0;s<symbols.length;s++){

    }

    for(var p=0;p<hackGame.playerSeq.length;p++){
      h += hackGame.playerSeq[p] + ' ';
    }
    h += '</div>';
  }

  h += '<div style="margin-top:12px;"><span class="btn" onclick="hackGame.active=false;gameState=\'hub\';render();">[ABORT]</span></div>';

function startHackGame(){
  var symbols = ['\u25B2','\u25BC','\u25C0','\u25B6','\u2605','\u2666'];
  hackGame.active = true;
  hackGame.sequence = [];
  hackGame.playerSeq = [];
  hackGame.round = 0;
  hackGame.maxRounds = 5;
  hackGame.reward = rand(200, 500) * Math.ceil(player.floor / 2);
  hackGame.showing = true;

  // Generate full sequence
  for(var i=0;i<hackGame.maxRounds;i++){
    hackGame.sequence.push(symbols[rand(0, symbols.length - 1)]);
  }

  gameState = 'hackgame';
  render();

  // Show sequence then hide
  setTimeout(function(){
    hackGame.showing = false;
    render();
  }, 2000 + hackGame.round * 500);
}

function hackInput(symbolIdx){
  var symbols = ['\u25B2','\u25BC','\u25C0','\u25B6','\u2605','\u2666'];
  if(hackGame.showing) return;

  hackGame.playerSeq.push(symbols[symbolIdx]);
  beep(400 + symbolIdx * 100, 50, 0.03);

  var idx = hackGame.playerSeq.length - 1;
  if(hackGame.playerSeq[idx] !== hackGame.sequence[idx]){
    // Wrong!
    log('ICE CRACKER: Failed at round ' + (hackGame.round + 1) + '!', 'var(--red)');
    toast('HACK FAILED!');
    var partialReward = Math.floor(hackGame.reward * hackGame.round / hackGame.maxRounds * 0.5);
    if(partialReward > 0){
      gainCred(partialReward);
      log('Partial data recovered: ' + formatCred(partialReward), 'var(--amber)');
    }
    hackGame.active = false;
    gameState = 'hub';
    save();
    render();
    return;
  }

  if(hackGame.playerSeq.length > hackGame.round){
    // Completed this round
    hackGame.round++;
    hackGame.playerSeq = [];

    if(hackGame.round >= hackGame.maxRounds){
      // Won!
      log('ICE CRACKER: Complete! Perfect crack!', 'var(--green)');
      toast('ICE CRACKED!', 2500);
      gainCred(hackGame.reward);
      gainXP(rand(40, 100));
      changeRep('underground', 5);
      hackGame.active = false;
      gameState = 'hub';
      save();
      render();
      return;
    }

    // Show next round
    hackGame.showing = true;
    render();
    setTimeout(function(){
      hackGame.showing = false;
      render();
    }, 2000 + hackGame.round * 500);
    return;
  }

  render();
}

  {id:'boss3',name:'BOSS HUNTER',desc:'Defeat 3 bosses.',target:'bossKills',amount:3,reward:1500,xpReward:300,repReward:{underground:10}},
  {id:'cred5000',name:'WEALTH ACCUMULATOR',desc:'Earn 5000 total CRED.',target:'credEarned',amount:5000,reward:1000,xpReward:150,repReward:{corporate:5}},
  {id:'nodes20',name:'NODE CRAWLER',desc:'Hack through 20 nodes.',target:'nodesHacked',amount:20,reward:700,xpReward:180,repReward:{underground:7}},
];

function renderBounties(){
  var h = '<div style="padding:10px;">';
  h += '<div class="section-hdr">\u2554\u2550\u2550 BOUNTY BOARD \u2550\u2550\u2557</div>';
  h += '<div class="c-dim" style="margin:6px 0;">Accept contracts for CRED and reputation. Progress tracked automatically.</div>';

  if(!player._bounties) player._bounties = {};
  if(!player._completedBounties) player._completedBounties = [];

  for(var i=0;i<BOUNTIES.length;i++){
    var b = BOUNTIES[i];
    var completed = player._completedBounties.indexOf(b.id) >= 0;
    var active = !!player._bounties[b.id];
    var progress = 0;
    if(b.target === 'kills') progress = player.stats.kills;
    else if(b.target === 'floorRecord') progress = player.stats.floorRecord;
    else if(b.target === 'bossKills') progress = player.stats.bossKills;
    else if(b.target === 'credEarned') progress = player.stats.credEarned;
    else if(b.target === 'nodesHacked') progress = player.stats.nodesHacked;

    var startProgress = active ? player._bounties[b.id].start : progress;
    var current = progress - startProgress;
    var pct = Math.min(100, Math.floor(current / b.amount * 100));

    var borderColor = completed ? '#333' : (active ? 'var(--cyan)' : 'var(--dimgreen)');
    h += '<div style="border:1px solid '+borderColor+';padding:4px 6px;margin:3px 0;'+(completed?'opacity:0.4;':'') +'">';
    h += '<div><span class="c-cyan">' + esc(b.name) + '</span>' + (completed ? ' <span class="c-green">[DONE]</span>' : '') + '</div>';
    h += '<div class="c-dim" style="font-size:17px;">' + esc(b.desc) + '</div>';
    h += '<div style="font-size:17px;">Reward: <span class="c-green">' + formatCred(b.reward) + '</span> + <span class="c-amber">' + b.xpReward + ' XP</span></div>';

    if(active && !completed){
      h += '<div class="bar-container bar-xp" style="margin:3px 0;"><div class="bar-fill" style="width:'+pct+'%;"></div></div>';
      h += '<div style="font-size:16px;">' + Math.min(current, b.amount) + '/' + b.amount + '</div>';
      if(current >= b.amount){
        h += '<div class="btn btn-cyan" onclick="claimBounty(\''+b.id+'\')" style="font-size:17px;">[CLAIM REWARD]</div>';
      }
    } else if(!active && !completed){
      h += '<div class="btn" onclick="acceptBounty(\''+b.id+'\')" style="font-size:17px;">[ACCEPT]</div>';
    }
    h += '</div>';
  }

  h += '<div style="margin-top:12px;"><span class="btn" onclick="gameState=\'hub\';render();">[BACK]</span></div>';
  h += '</div>';
  $main.innerHTML = h;
}

function acceptBounty(id){
  if(!player._bounties) player._bounties = {};
  var b = BOUNTIES.find(function(x){return x.id === id;});
  if(!b) return;
  var progress = 0;
  if(b.target === 'kills') progress = player.stats.kills;
  else if(b.target === 'floorRecord') progress = player.stats.floorRecord;
  else if(b.target === 'bossKills') progress = player.stats.bossKills;
  else if(b.target === 'credEarned') progress = player.stats.credEarned;
  else if(b.target === 'nodesHacked') progress = player.stats.nodesHacked;
  player._bounties[id] = {start: progress};
  log('Bounty accepted: ' + b.name, 'var(--cyan)');
  save();
  render();
}

function claimBounty(id){
  if(!player._completedBounties) player._completedBounties = [];
  var b = BOUNTIES.find(function(x){return x.id === id;});
  if(!b) return;
  player._completedBounties.push(id);
  delete player._bounties[id];
  gainCred(b.reward);
  gainXP(b.xpReward);
  if(b.repReward){
    for(var fac in b.repReward) changeRep(fac, b.repReward[fac]);
  }
  log('Bounty completed: ' + b.name + '!', 'var(--magenta)');
  toast('BOUNTY COMPLETE: ' + b.name);
  save();
  render();
}

// ── PROGRAM CRAFTING (combine 2 programs for upgrade) ──
var CRAFT_RECIPES = [
  {input:['PORTSCAN.EXE','BRUTEFORCE.SH'],output:'EXPLOIT.DB',desc:'Combine basic tools into an exploit chain'},
  {input:['EXPLOIT.DB','SQL_INJECT'],output:'METASPLOIT',desc:'Full exploit framework from injection vectors'},
  {input:['REPAIR_KIT','REPAIR_KIT'],output:'LARGE_REPAIR',desc:'Combine two repair kits'},
  {input:['METASPLOIT','ICE_PICK'],output:'ZERO_DAY',desc:'Forge a zero-day from advanced tools'},
  {input:['CRYPTWALL','PROXY.SHIELD'],output:'GHOST_PROTOCOL',desc:'Ultimate stealth from layered defenses'},
  {input:['DAEMON.BOT','NEURAL_IMPLANT'],output:'BLACK_ICE_SHARD',desc:'Merge daemon with neural tech'},
];

function renderCrafting(){
  var h = '<div style="padding:10px;">';
  h += '<div class="section-hdr">\u2554\u2550\u2550 PROGRAM FORGE \u2550\u2550\u2557</div>';
  h += '<div class="c-dim" style="margin:6px 0;">Combine programs to create more powerful versions. Consumes input programs.</div>';

  for(var i=0;i<CRAFT_RECIPES.length;i++){
    var r = CRAFT_RECIPES[i];
    var hasA = player.programs.indexOf(r.input[0]) >= 0;
    var hasB = player.programs.indexOf(r.input[1]) >= 0;
    // For duplicate inputs, check count
    if(r.input[0] === r.input[1]){
      var count = player.programs.filter(function(p){return p === r.input[0];}).length;
      hasA = count >= 1;
      hasB = count >= 2;
    }
    var canCraft = hasA && hasB && player.programs.length < 20;
    var borderColor = canCraft ? 'var(--cyan)' : '#333';
    h += '<div style="border:1px solid '+borderColor+';padding:4px 6px;margin:3px 0;">';
    h += '<div><span class="'+(hasA?'c-green':'c-red')+'">' + esc(r.input[0]) + '</span>';
    h += ' + <span class="'+(hasB?'c-green':'c-red')+'">' + esc(r.input[1]) + '</span>';
    h += ' \u2192 <span class="c-magenta">' + esc(r.output) + '</span></div>';
    h += '<div class="c-dim" style="font-size:16px;">' + esc(r.desc) + '</div>';
    if(canCraft){
      h += '<div class="btn btn-cyan" onclick="doCraft('+i+')" style="font-size:17px;">[FORGE]</div>';
    }
    h += '</div>';
  }

  h += '<div style="margin-top:12px;"><span class="btn" onclick="gameState=\'hub\';render();">[BACK]</span></div>';
  h += '</div>';
  $main.innerHTML = h;
}

function doCraft(recipeIdx){
  var r = CRAFT_RECIPES[recipeIdx];
  if(!r) return;
  // Remove inputs
  for(var i=0;i<r.input.length;i++){
    var idx = player.programs.indexOf(r.input[i]);
    if(idx >= 0){
      player.programs.splice(idx, 1);
      var eIdx = player.equipped.indexOf(r.input[i]);
      if(eIdx >= 0) player.equipped.splice(eIdx, 1);
    }
  }
  // Add output
  player.programs.push(r.output);
  log('Forged: ' + r.output + '!', 'var(--magenta)');
  toast('FORGED: ' + r.output);
  save();
  render();
}

// Extend commands
var _cmd2 = processCommand;
processCommand = function(cmd){
  if(gameState === 'hub'){
    if(cmd === 'h' || cmd === 'hack'){startHackGame();return;}
    if(cmd === 'b' || cmd === 'bounty' || cmd === 'bounties'){gameState='bounties';render();return;}
    if(cmd === 'c' || cmd === 'craft' || cmd === 'forge'){gameState='crafting';render();return;}
  }
  if(gameState === 'bounties' || gameState === 'crafting' || gameState === 'hackgame'){
    if(cmd === 'back' || cmd === 'hub'){hackGame.active=false;gameState='hub';render();return;}
  }
  _cmd2(cmd);
};
